name = "gender-reveal"
pages_build_output_dir = "public"

# KV namespace para RSVP — configura el ID real en el dashboard de Cloudflare Pages
# Settings → Functions → KV namespace bindings → Add binding: RSVP_DATA
[[kv_namespaces]]
binding = "RSVP_DATA"
id = "TU_ID_DE_KV_AQUI"

# Variables de entorno — configura ADMIN_KEY en Cloudflare Pages dashboard
# Settings → Environment variables → Add variable: ADMIN_KEY
[vars]
ADMIN_KEY = "cambiar-en-cloudflare-dashboard"

[[functions]]
directory = "functions"
